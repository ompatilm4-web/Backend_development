<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
        135deg,
        #4F46E5,
        #7C3AED
    );
}

.card{

    width:400px;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.2);

}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

.message{

    background:#EEF2FF;

    color:#4338CA;

    padding:12px;

    border-radius:10px;

    text-align:center;

    margin-bottom:15px;

}

.error{

    background:#FEE2E2;

    color:#DC2626;

}

input{

    width:100%;

    padding:15px;

    margin-bottom:15px;

    border-radius:10px;

    border:1px solid #ddd;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#4F46E5;

    color:white;

    cursor:pointer;

}

.bottom{
    text-align:center;
    margin-top:20px;
}

a{
    text-decoration:none;
    color:#4F46E5;
}

</style>

</head>

<body>

<div class="card">

<h1>Welcome Back 👋</h1>

<p>Login to continue</p>

<div class="message">
</div>

<div class="message error">
</div>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

<div class="bottom">
Don't have an account?
<a href="/signup">Sign Up</a>
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Welcome</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#4F46E5,
#7C3AED
);

}

.card{

width:600px;

background:white;

padding:50px;

border-radius:20px;

text-align:center;

box-shadow:
0 20px 50px rgba(0,0,0,.2);

}

h1{

color:#4F46E5;

margin-bottom:20px;

font-size:40px;

}

p{

color:gray;

font-size:18px;

margin-bottom:30px;

}

button{

padding:15px 40px;

border:none;

border-radius:10px;

background:#4F46E5;

color:white;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#4338CA;

}

</style>

</head>

<body>

<div class="card">

<h1>
Welcome 🎉
</h1>

<p>
{{ message }}
</p>

<form action="/">

<button>
Logout
</button>

</form>

</div>

</body>

</html>

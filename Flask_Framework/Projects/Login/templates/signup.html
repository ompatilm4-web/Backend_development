<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#4F46E5,
#7C3AED
);

}

.card{

width:420px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 20px 50px rgba(0,0,0,.2);

}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:gray;
margin-bottom:25px;
}

input{

width:100%;

padding:15px;

margin-bottom:15px;

border-radius:10px;

border:1px solid #ddd;

}

button{

width:100%;

padding:15px;

border:none;

background:#4F46E5;

color:white;

border-radius:10px;

cursor:pointer;

}

.bottom{
margin-top:20px;
text-align:center;
}

a{
text-decoration:none;
color:#4F46E5;
}

</style>

</head>

<body>

<div class="card">

<h1>Create Account 🚀</h1>

<p>Join us today</p>

<form method="POST">

<input
type="text"
placeholder="Full Name"
required
>

<input
type="email"
placeholder="Email"
required
>

<input
type="password"
placeholder="Password"
required
>

<input
type="password"
placeholder="Confirm Password"
required
>

<button>
Create Account
</button>

</form>

<div class="bottom">

Already have account?

<a href="/login">
Login
</a>

</div>

</div>

</body>
</html>

<!DOCTYPE html>

<html>

<head>

<title>
Jobs
</title>

<style>

body{

background:#0f172a;

color:white;

font-family:Poppins;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
350px,
1fr
)
);

gap:25px;

padding:40px;

}

.job{

background:#1e293b;

padding:30px;

border-radius:20px;

}

.job h2{

margin-bottom:15px;

}

.apply{

display:inline-block;

margin:20px 0;

background:#2563eb;

padding:12px 20px;

color:white;

text-decoration:none;

border-radius:10px;

}

button{

padding:12px 20px;

border:none;

background:#22c55e;

color:white;

border-radius:10px;

}

</style>

</head>

<body>

<h1
style="
padding:40px
"
>
Available Jobs
</h1>

<div class="grid">

{% for job in jobs %}

<div class="job">

<h2>

{{job.title}}

</h2>

<p>

{{job.company}}

</p>

<p>

{{job.location}}

</p>

<a
href="{{job.link}}"
class="apply"
>

Apply

</a>

<form
action="/save"
method="POST"
>

<input
type="hidden"
name="title"
value="{{job.title}}"
>

<button>

Save Job

</button>

</form>

</div>

{% endfor %}

</div>

</body>

</html>

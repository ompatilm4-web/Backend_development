<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Job Hunter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#020617
);

color:white;

}

nav{

width:90%;

margin:auto;

padding:25px;

display:flex;

justify-content:space-between;

}

nav a{

color:white;

text-decoration:none;

}

.hero{

width:90%;

margin:auto;

height:85vh;

display:grid;

grid-template-columns:1fr 1fr;

align-items:center;

}

.hero h1{

font-size:72px;

}

.hero p{

margin:25px 0;

color:#94a3b8;

}

form{

display:flex;

gap:15px;

flex-wrap:wrap;

}

input{

padding:18px;

border:none;

border-radius:15px;

width:280px;

}

button{

padding:18px 35px;

background:#2563eb;

border:none;

color:white;

border-radius:15px;

cursor:pointer;

}

.stats{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.card{

background:#1e293b;

padding:45px;

border-radius:24px;

}

.card h2{

font-size:40px;

}

@media(max-width:900px){

.hero{

grid-template-columns:1fr;

}

.hero h1{

font-size:42px;

}

}

</style>

</head>

<body>

<nav>

<h2>
Job Hunter
</h2>

<a href="/saved">
Saved Jobs
</a>

</nav>

<section class="hero">

<div>

<h1>
Find Your Dream Job
</h1>

<p>
Search thousands of live jobs instantly.
</p>

<form action="/jobs" method="POST">

<input
name="job"
placeholder="Python Developer"
required
>

<input
name="location"
placeholder="Remote / Pune"
>

<button>

Search

</button>

</form>

</div>

<div class="stats">

<div class="card">

<h2>
10K+
</h2>

<p>
Jobs
</p>

</div>

<div class="card">

<h2>
500+
</h2>

<p>
Companies
</p>

</div>

<div class="card">

<h2>
24×7
</h2>

<p>
Search
</p>

</div>

<div class="card">

<h2>
Fast
</h2>

<p>
Threaded
</p>

</div>

</div>

</section>

</body>

</html>

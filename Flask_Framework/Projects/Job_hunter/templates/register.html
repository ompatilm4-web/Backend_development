<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Poppins;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:350px;
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
}

a{
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="card">

<h1>Create Account</h1>

<form action="/register" method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p style="margin-top:15px;">
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
